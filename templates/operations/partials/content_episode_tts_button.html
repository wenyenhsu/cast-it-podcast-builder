{% if episode.can_generate_tts %}
<a
  class="btn btn-sm btn-outline-primary"
  href="{% url 'operations:tts_generation' %}?episode={{ episode.id }}"
>
  <i class="bi bi-soundwave me-1"></i>TTS
</a>
{% else %}
<a
  class="btn btn-sm btn-outline-secondary"
  href="{% url 'operations:content' %}?view=scripts&amp;episode={{ episode.id }}"
  title="Ready script required before TTS"
>
  <i class="bi bi-soundwave me-1"></i>TTS
</a>
{% endif %}
