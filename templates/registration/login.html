{% extends "operations/base.html" %}

{% block title %}Login | Cast It{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-5">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4 p-lg-5">
        <h1 class="h3 mb-3">Login</h1>
        <p class="text-secondary small mb-4">Sign in to access the operations dashboard.</p>
        <form method="post">
          {% csrf_token %}
          {% if form.non_field_errors %}
            <div class="alert alert-danger">{{ form.non_field_errors }}</div>
          {% endif %}
          <div class="mb-3">
            <label class="form-label" for="{{ form.username.id_for_label }}">Username</label>
            <input type="text" name="username" class="form-control" id="{{ form.username.id_for_label }}" required autofocus>
          </div>
          <div class="mb-4">
            <label class="form-label" for="{{ form.password.id_for_label }}">Password</label>
            <input type="password" name="password" class="form-control" id="{{ form.password.id_for_label }}" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
