# Staging stack — production-like image with Gunicorn and optional Nginx
# Usage: docker compose -f docker-compose.staging.yml --env-file .env.staging up --build

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
      args:
        BUILD_GIT_COMMIT: ${BUILD_GIT_COMMIT:-unknown}
        BUILD_NUMBER: ${BUILD_NUMBER:-staging}
        BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-}
        APP_VERSION: ${APP_VERSION:-0.1.0}
        IMAGE_TAG: ${IMAGE_TAG:-staging}
    command: gunicorn
    env_file:
      - .env.staging
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.staging
      ENVIRONMENT: staging
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      COLLECT_STATIC_ON_START: "true"
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_staging:/app/staticfiles
      - media_staging:/app/media
      - feeds_staging:/app/feeds
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/ready/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  celery-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    command: celery-worker
    env_file:
      - .env.staging
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.staging
      ENVIRONMENT: staging
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - media_staging:/app/media
      - feeds_staging:/app/feeds
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A config inspect ping --timeout 5 | grep -q OK",
        ]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s

  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    command: celery-beat
    env_file:
      - .env.staging
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.staging
      ENVIRONMENT: staging
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      web:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_staging:/var/www/static:ro
      - media_staging:/var/www/media:ro
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/v1/health/live/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_staging_data:
  static_staging:
  media_staging:
  feeds_staging:
