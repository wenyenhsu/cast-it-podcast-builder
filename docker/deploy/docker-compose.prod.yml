# Production-like deployment stack
# Run from repo root:
#   cp docker/deploy/.env.production.example docker/deploy/.env.production
#   docker compose -f docker/deploy/docker-compose.prod.yml --env-file docker/deploy/.env.production up -d

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ../../backups/postgres:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    image: ${IMAGE_NAME:-cast-it}:${IMAGE_TAG:-latest}
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      target: production
      args:
        BUILD_GIT_COMMIT: ${BUILD_GIT_COMMIT}
        BUILD_NUMBER: ${BUILD_NUMBER}
        BUILD_TIMESTAMP: ${BUILD_TIMESTAMP}
        APP_VERSION: ${APP_VERSION:-0.1.0}
        IMAGE_TAG: ${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: gunicorn
    env_file:
      - .env.production
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      ENVIRONMENT: production
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      COLLECT_STATIC_ON_START: "true"
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_prod:/app/staticfiles
      - media_prod:/app/media
      - feeds_prod:/app/feeds
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/ready/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  celery-worker:
    image: ${IMAGE_NAME:-cast-it}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: celery-worker
    env_file:
      - .env.production
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      ENVIRONMENT: production
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - media_prod:/app/media
      - feeds_prod:/app/feeds
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A config inspect ping --timeout 5 | grep -q OK",
        ]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s

  celery-beat:
    image: ${IMAGE_NAME:-cast-it}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: celery-beat
    env_file:
      - .env.production
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      ENVIRONMENT: production
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      web:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_prod:/var/www/static:ro
      - media_prod:/var/www/media:ro
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/v1/health/live/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_prod_data:
  redis_prod_data:
  static_prod:
  media_prod:
  feeds_prod:
