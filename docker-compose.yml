# Local development stack
# Usage: docker compose up --build

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cast_it}
      POSTGRES_USER: ${POSTGRES_USER:-cast_it}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cast_it}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No host port by default — services connect via the internal network.
    # To expose Postgres on the host (e.g. for local pytest), use:
    #   docker compose -f docker-compose.yml -f docker-compose.host-access.yml up -d db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-cast_it} -d ${POSTGRES_DB:-cast_it}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    # No host port — avoids conflicts with a local Redis on 6379.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    command: web
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      ENVIRONMENT: development
      TIME_ZONE: ${TIME_ZONE:-America/Los_Angeles}
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SKIP_WAIT_FOR_SERVICES: "false"
    ports:
      # WEB_PORT=8000 for a fixed port; WEB_PORT=0 or unset = random host port
      - target: 8000
        published: ${WEB_PORT:-0}
        protocol: tcp
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - media_data:/app/media
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/live/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  celery-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    command: celery-worker
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      ENVIRONMENT: development
      TIME_ZONE: ${TIME_ZONE:-America/Los_Angeles}
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    volumes:
      - .:/app
      - media_data:/app/media

  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    command: celery-beat
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      ENVIRONMENT: development
      TIME_ZONE: ${TIME_ZONE:-America/Los_Angeles}
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    volumes:
      - .:/app

volumes:
  postgres_data:
  media_data:
