name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.13"
  DJANGO_SETTINGS_MODULE: config.settings.testing
  DJANGO_SECRET_KEY: ci-secret-key-not-for-production
  POSTGRES_DB: cast_it_test
  POSTGRES_USER: cast_it
  POSTGRES_PASSWORD: cast_it
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432
  REDIS_URL: redis://localhost:6379/0
  CELERY_BROKER_URL: redis://localhost:6379/0
  CELERY_RESULT_BACKEND: redis://localhost:6379/0

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: cast_it_test
          POSTGRES_USER: cast_it
          POSTGRES_PASSWORD: cast_it
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cast_it -d cast_it_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements/dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Black format check
        run: black --check .

      - name: Mypy type check
        run: mypy apps api config domain infrastructure services

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: pytest --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        run: |
          docker build \
            --file docker/Dockerfile \
            --target production \
            --build-arg BUILD_GIT_COMMIT=${{ github.sha }} \
            --build-arg BUILD_NUMBER=${{ github.run_number }} \
            --build-arg BUILD_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
            --build-arg APP_VERSION=0.1.0 \
            --build-arg IMAGE_TAG=${{ github.sha }} \
            --tag cast-it:${{ github.sha }} \
            .

      - name: Verify image metadata
        run: |
          docker run --rm \
            -e DJANGO_SECRET_KEY=ci-secret \
            -e DJANGO_ALLOWED_HOSTS=localhost \
            -e ENVIRONMENT=production \
            -e POSTGRES_DB=cast_it \
            -e POSTGRES_USER=cast_it \
            -e POSTGRES_PASSWORD=cast_it \
            -e POSTGRES_HOST=localhost \
            -e REDIS_URL=redis://localhost:6379/0 \
            -e CELERY_BROKER_URL=redis://localhost:6379/0 \
            cast-it:${{ github.sha }} validate-config --warn-only

  release:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build release image
        run: |
          docker build \
            --file docker/Dockerfile \
            --target production \
            --build-arg BUILD_GIT_COMMIT=${{ github.sha }} \
            --build-arg BUILD_NUMBER=${{ github.run_number }} \
            --build-arg BUILD_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
            --build-arg APP_VERSION=0.1.0 \
            --build-arg IMAGE_TAG=release-${{ github.run_number }} \
            --tag cast-it:release-${{ github.run_number }} \
            .

      - name: Post-build verification checklist
        run: |
          echo "Release image built: cast-it:release-${{ github.run_number }}"
          echo "Deploy with: docker compose -f docker-compose.prod.yml up -d"
          echo "Rollback by redeploying the previous IMAGE_TAG."
