<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" role="img" aria-label="Cast It System Architecture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#121A2F"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="cardPurple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4C1D95"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="cardTeal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#115E59"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="cardOrange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9A3412"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#93C5FD"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34D399"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #94A3B8; }
      .section { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #E2E8F0; letter-spacing: 0.08em; }
      .h { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .p { font: 400 11.5px 'Segoe UI', Arial, sans-serif; fill: #CBD5E1; }
      .code { font: 600 10.5px ui-monospace, Menlo, Consolas, monospace; fill: #93C5FD; }
      .muted { font: 400 11px 'Segoe UI', Arial, sans-serif; fill: #94A3B8; }
      .badge { font: 700 11px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .goalTitle { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #FDE68A; letter-spacing: 0.1em; }
      .goalBody { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #FEF3C7; }
      .stepNum { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #BFDBFE; }
      .stepTitle { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .small { font: 400 10.5px 'Segoe UI', Arial, sans-serif; fill: #DBEAFE; }
      .legend { font: 400 11px 'Segoe UI', Arial, sans-serif; fill: #CBD5E1; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="140" cy="120" r="180" fill="#1D4ED8" opacity="0.08"/>
  <circle cx="1480" cy="860" r="220" fill="#7C3AED" opacity="0.08"/>

  <!-- Header -->
  <text class="title" x="48" y="56">Cast It System Architecture</text>
  <text class="subtitle" x="48" y="84">From Raw News to Published Podcast Episodes</text>

  <rect x="980" y="28" width="572" height="72" rx="12" fill="#1F2937" stroke="#F59E0B" stroke-width="1.5" filter="url(#soft)"/>
  <text class="goalTitle" x="1000" y="52">GOAL</text>
  <text class="goalBody" x="1000" y="74">Automate the full podcast pipeline  ingest news, generate grounded</text>
  <text class="goalBody" x="1000" y="90">LLM scripts, synthesize multi-voice audio, and publish.</text>

  <!-- 1. INPUT SOURCES -->
  <rect x="32" y="128" width="250" height="520" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5" filter="url(#soft)"/>
  <text class="section" x="52" y="158">1. INPUT SOURCES</text>

  <rect x="52" y="176" width="210" height="36" rx="8" fill="#1E3A8A"/>
  <text class="badge" x="68" y="199">RSS Feeds</text>
  <rect x="52" y="220" width="210" height="36" rx="8" fill="#1E3A8A"/>
  <text class="badge" x="68" y="243">Gmail Newsletters</text>
  <rect x="52" y="264" width="210" height="36" rx="8" fill="#1E3A8A"/>
  <text class="badge" x="68" y="287">Manual Articles</text>
  <rect x="52" y="308" width="210" height="36" rx="8" fill="#1E3A8A"/>
  <text class="badge" x="68" y="331">News HTML / API</text>

  <text class="muted" x="52" y="372">ROADMAP</text>
  <rect x="52" y="384" width="210" height="30" rx="8" fill="#1F2937" stroke="#475569"/>
  <text class="p" x="68" y="404">YouTube / Podcasts</text>
  <rect x="52" y="422" width="210" height="30" rx="8" fill="#1F2937" stroke="#475569"/>
  <text class="p" x="68" y="442">PDF / Social Media</text>

  <rect x="52" y="478" width="210" height="140" rx="12" fill="#0F172A" stroke="#38BDF8" stroke-dasharray="4 3"/>
  <text class="h" x="68" y="508">Inbox Raw Articles</text>
  <text class="p" x="68" y="532">Article model</text>
  <text class="p" x="68" y="550">dedupe by content_hash</text>
  <text class="p" x="68" y="568">selected_for_script</text>
  <text class="code" x="68" y="596">apps/articles</text>

  <!-- 3. OUTPUTS -->
  <rect x="1318" y="128" width="250" height="520" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5" filter="url(#soft)"/>
  <text class="section" x="1338" y="158">3. OUTPUTS</text>

  <rect x="1338" y="176" width="210" height="52" rx="10" fill="url(#cardOrange)"/>
  <text class="badge" x="1354" y="198">Podcast Scripts</text>
  <text class="small" x="1354" y="216">segments · validation</text>

  <rect x="1338" y="238" width="210" height="52" rx="10" fill="url(#cardOrange)"/>
  <text class="badge" x="1354" y="260">Episode Audio</text>
  <text class="small" x="1354" y="278">final MP3 / WAV</text>

  <rect x="1338" y="300" width="210" height="52" rx="10" fill="url(#cardOrange)"/>
  <text class="badge" x="1354" y="322">RSS Feed</text>
  <text class="small" x="1354" y="340">ENABLE_RSS_PUBLISHING</text>

  <rect x="1338" y="362" width="210" height="52" rx="10" fill="url(#cardOrange)"/>
  <text class="badge" x="1354" y="384">YouTube (optional)</text>
  <text class="small" x="1354" y="402">adapter + OAuth</text>

  <rect x="1338" y="424" width="210" height="52" rx="10" fill="url(#cardOrange)"/>
  <text class="badge" x="1354" y="446">Supabase Shelf</text>
  <text class="small" x="1354" y="464">listener frontend</text>

  <rect x="1338" y="486" width="210" height="52" rx="10" fill="url(#cardOrange)"/>
  <text class="badge" x="1354" y="508">Ops Dashboard</text>
  <text class="small" x="1354" y="526">/content · /pipeline</text>

  <rect x="1338" y="548" width="210" height="72" rx="10" fill="#0F172A" stroke="#FB923C"/>
  <text class="h" x="1354" y="574">API Clients</text>
  <text class="code" x="1354" y="596">/api/v1/*</text>
  <text class="p" x="1354" y="614">jobs · episodes · health</text>

  <!-- 2. PIPELINE -->
  <rect x="302" y="128" width="996" height="360" rx="16" fill="#0F172A" stroke="#334155" stroke-width="1.5" filter="url(#soft)"/>
  <text class="section" x="322" y="156">2. PODCAST PRODUCTION PIPELINE</text>

  <!-- Step cards: 8 steps in 2 rows of 4 -->
  <!-- Row 1 -->
  <g transform="translate(322,176)">
    <rect width="220" height="130" rx="12" fill="url(#cardBlue)" filter="url(#soft)"/>
    <text class="stepNum" x="14" y="28">01</text>
    <text class="stepTitle" x="52" y="28">Fetch &amp; Ingest</text>
    <text class="code" x="14" y="52">import_news · RSSProvider</text>
    <text class="small" x="14" y="76">" Parse RSS / newsletter</text>
    <text class="small" x="14" y="94">" Dedupe &amp; store Article</text>
    <text class="small" x="14" y="112">" Tag source metadata</text>
  </g>
  <g transform="translate(560,176)">
    <rect width="220" height="130" rx="12" fill="url(#cardBlue)" filter="url(#soft)"/>
    <text class="stepNum" x="14" y="28">02</text>
    <text class="stepTitle" x="52" y="28">Intelligence</text>
    <text class="code" x="14" y="52">summarize · classify · rank</text>
    <text class="small" x="14" y="76">" Summary + category</text>
    <text class="small" x="14" y="94">" Fixed taxonomy tags</text>
    <text class="small" x="14" y="112">" Importance scoring</text>
  </g>
  <g transform="translate(798,176)">
    <rect width="220" height="130" rx="12" fill="url(#cardBlue)" filter="url(#soft)"/>
    <text class="stepNum" x="14" y="28">03</text>
    <text class="stepTitle" x="52" y="28">Episode Plan</text>
    <text class="code" x="14" y="52">episode_planning</text>
    <text class="small" x="14" y="76">" Create Episode</text>
    <text class="small" x="14" y="94">" Link ranked articles</text>
    <text class="small" x="14" y="112">" Select script sources</text>
  </g>
  <g transform="translate(1036,176)">
    <rect width="220" height="130" rx="12" fill="url(#cardBlue)" filter="url(#soft)"/>
    <text class="stepNum" x="14" y="28">04</text>
    <text class="stepTitle" x="52" y="28">Script LLM</text>
    <text class="code" x="14" y="52">ScriptGenerationService</text>
    <text class="small" x="14" y="76">" Brief ’ outline ’ dialogue</text>
    <text class="small" x="14" y="94">" Critic / rewrite loop</text>
    <text class="small" x="14" y="112">" Coherence pass (manual)</text>
  </g>

  <!-- arrows row1 -->
  <path d="M542 241 H552" stroke="#93C5FD" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M780 241 H790" stroke="#93C5FD" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M1018 241 H1028" stroke="#93C5FD" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Row 2 -->
  <g transform="translate(322,330)">
    <rect width="220" height="130" rx="12" fill="url(#cardTeal)" filter="url(#soft)"/>
    <text class="stepNum" x="14" y="28">05</text>
    <text class="stepTitle" x="52" y="28">RAG Assist</text>
    <text class="code" x="14" y="52">ScriptRagService · pgvector</text>
    <text class="small" x="14" y="76">" Index article chunks</text>
    <text class="small" x="14" y="94">" Retrieve if over token budget</text>
    <text class="small" x="14" y="112">" Inject into chapter prompts</text>
  </g>
  <g transform="translate(560,330)">
    <rect width="220" height="130" rx="12" fill="url(#cardBlue)" filter="url(#soft)"/>
    <text class="stepNum" x="14" y="28">06</text>
    <text class="stepTitle" x="52" y="28">TTS Audio</text>
    <text class="code" x="14" y="52">ChatterboxProvider</text>
    <text class="small" x="14" y="76">" Intro / expert / beginner</text>
    <text class="small" x="14" y="94">" Per-segment synthesis</text>
    <text class="small" x="14" y="112">" Voice identity preserved</text>
  </g>
  <g transform="translate(798,330)">
    <rect width="220" height="130" rx="12" fill="url(#cardBlue)" filter="url(#soft)"/>
    <text class="stepNum" x="14" y="28">07</text>
    <text class="stepTitle" x="52" y="28">Audio Pipeline</text>
    <text class="code" x="14" y="52">AudioPipelineService · FFmpeg</text>
    <text class="small" x="14" y="76">" Concat + silence pads</text>
    <text class="small" x="14" y="94">" Optional intro/outro/BGM</text>
    <text class="small" x="14" y="112">" Loudness normalize</text>
  </g>
  <g transform="translate(1036,330)">
    <rect width="220" height="130" rx="12" fill="url(#cardBlue)" filter="url(#soft)"/>
    <text class="stepNum" x="14" y="28">08</text>
    <text class="stepTitle" x="52" y="28">Publish</text>
    <text class="code" x="14" y="52">PublishService</text>
    <text class="small" x="14" y="76">" RSS / YouTube adapters</text>
    <text class="small" x="14" y="94">" Supabase shelf push</text>
    <text class="small" x="14" y="112">" Taxonomy sync</text>
  </g>

  <path d="M542 395 H552" stroke="#93C5FD" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M780 395 H790" stroke="#93C5FD" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M1018 395 H1028" stroke="#93C5FD" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- wrap from 04 to 05 -->
  <path d="M1256 241 H1276 V300 H432 V330" fill="none" stroke="#93C5FD" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Orchestration -->
  <rect x="302" y="508" width="996" height="140" rx="16" fill="#111827" stroke="#A78BFA" stroke-width="1.5" filter="url(#soft)"/>
  <text class="section" x="322" y="536">ORCHESTRATION ENGINE</text>
  <text class="code" x="520" y="536">Celery Beat + Worker · JobService · WorkflowEngine</text>

  <rect x="322" y="556" width="180" height="68" rx="10" fill="url(#cardPurple)"/>
  <text class="badge" x="338" y="582">Schedule (cron)</text>
  <text class="small" x="338" y="602">import · plan · audio</text>

  <rect x="518" y="556" width="180" height="68" rx="10" fill="url(#cardPurple)"/>
  <text class="badge" x="534" y="582">Queues</text>
  <text class="small" x="534" y="602">ingestion / llm / tts&</text>

  <rect x="714" y="556" width="180" height="68" rx="10" fill="url(#cardPurple)"/>
  <text class="badge" x="730" y="582">Job Lifecycle</text>
  <text class="small" x="730" y="602">retry · cancel · progress</text>

  <rect x="910" y="556" width="180" height="68" rx="10" fill="url(#cardPurple)"/>
  <text class="badge" x="926" y="582">Observability</text>
  <text class="small" x="926" y="602">logs · metrics · health</text>

  <rect x="1106" y="556" width="170" height="68" rx="10" fill="url(#cardPurple)"/>
  <text class="badge" x="1122" y="582">Manual Script</text>
  <text class="small" x="1122" y="602">/content Generate</text>

  <!-- 4. TOOLS -->
  <rect x="32" y="672" width="1536" height="100" rx="16" fill="#0F172A" stroke="#334155" stroke-width="1.5" filter="url(#soft)"/>
  <text class="section" x="52" y="700">4. TOOLS &amp; INFRASTRUCTURE</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#F8FAFC">
    <rect x="52" y="716" width="170" height="36" rx="8" fill="#1E293B" stroke="#64748B"/>
    <text x="68" y="739">Ollama (LLM + Embed)</text>
    <rect x="238" y="716" width="150" height="36" rx="8" fill="#1E293B" stroke="#64748B"/>
    <text x="254" y="739">Chatterbox TTS</text>
    <rect x="404" y="716" width="190" height="36" rx="8" fill="#1E293B" stroke="#64748B"/>
    <text x="420" y="739">PostgreSQL 16 + pgvector</text>
    <rect x="610" y="716" width="120" height="36" rx="8" fill="#1E293B" stroke="#64748B"/>
    <text x="626" y="739">Redis Broker</text>
    <rect x="746" y="716" width="100" height="36" rx="8" fill="#1E293B" stroke="#64748B"/>
    <text x="762" y="739">Celery</text>
    <rect x="862" y="716" width="100" height="36" rx="8" fill="#1E293B" stroke="#64748B"/>
    <text x="878" y="739">FFmpeg</text>
    <rect x="978" y="716" width="150" height="36" rx="8" fill="#1E293B" stroke="#64748B"/>
    <text x="994" y="739">Docker Compose</text>
    <rect x="1144" y="716" width="120" height="36" rx="8" fill="#1E293B" stroke="#64748B"/>
    <text x="1160" y="739">Django 5</text>
    <rect x="1280" y="716" width="160" height="36" rx="8" fill="#1E293B" stroke="#64748B"/>
    <text x="1296" y="739">Nginx (staging/prod)</text>
  </g>

  <!-- 5. OVERVIEW + 6. DATA FLOW + LEGEND -->
  <rect x="32" y="792" width="520" height="176" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5"/>
  <text class="section" x="52" y="820">5. SYSTEM OVERVIEW</text>
  <text class="p" x="52" y="848">Cast It turns tech news into multi-voice podcast episodes.</text>
  <text class="p" x="52" y="866">Articles are summarized, ranked, and selected; a multi-stage</text>
  <text class="p" x="52" y="884">LLM pipeline writes grounded dialogue; Chatterbox + FFmpeg</text>
  <text class="p" x="52" y="902">produce final audio; Celery orchestrates retries and schedules.</text>
  <text class="p" x="52" y="928">Script generation is manual from the Operations Dashboard.</text>
  <text class="code" x="52" y="952">services/ · domain/ · infrastructure/</text>

  <rect x="572" y="792" width="640" height="176" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5"/>
  <text class="section" x="592" y="820">6. DATA FLOW &amp; MEMORY</text>

  <rect x="592" y="844" width="100" height="40" rx="8" fill="#1E3A8A"/>
  <text class="badge" x="608" y="869" font-size="11">Raw</text>
  <path d="M700 864 H720" stroke="#93C5FD" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="728" y="844" width="100" height="40" rx="8" fill="#1E3A8A"/>
  <text class="badge" x="744" y="869" font-size="11">Intel</text>
  <path d="M836 864 H856" stroke="#93C5FD" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="864" y="844" width="100" height="40" rx="8" fill="#1E3A8A"/>
  <text class="badge" x="876" y="869" font-size="11">Episode</text>
  <path d="M972 864 H992" stroke="#93C5FD" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="1000" y="844" width="90" height="40" rx="8" fill="#1E3A8A"/>
  <text class="badge" x="1016" y="869" font-size="11">Script</text>
  <path d="M1098 864 H1118" stroke="#93C5FD" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="1126" y="844" width="60" height="40" rx="8" fill="#C2410C"/>
  <text class="badge" x="1136" y="869" font-size="11">Out</text>

  <rect x="592" y="908" width="200" height="40" rx="8" fill="#115E59"/>
  <text class="badge" x="608" y="933">pgvector RAG memory</text>
  <path d="M700 908 V884" fill="none" stroke="#34D399" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrowGreen)"/>

  <text class="muted" x="820" y="934">Feedback: retry sweep · provider health · pipeline monitor</text>
  <path d="M1186 864 C1220 864 1220 940 900 940" fill="none" stroke="#34D399" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowGreen)"/>

  <rect x="1232" y="792" width="336" height="176" rx="16" fill="#111827" stroke="#334155" stroke-width="1.5"/>
  <text class="section" x="1252" y="820">LEGEND</text>
  <rect x="1252" y="840" width="18" height="18" rx="4" fill="#1D4ED8"/>
  <text class="legend" x="1280" y="854">Processing step</text>
  <rect x="1252" y="870" width="18" height="18" rx="4" fill="#6D28D9"/>
  <text class="legend" x="1280" y="884">Orchestration</text>
  <rect x="1252" y="900" width="18" height="18" rx="4" fill="#C2410C"/>
  <text class="legend" x="1280" y="914">Output</text>
  <rect x="1252" y="930" width="18" height="18" rx="4" fill="#0F766E"/>
  <text class="legend" x="1280" y="944">Memory / RAG</text>
</svg>
